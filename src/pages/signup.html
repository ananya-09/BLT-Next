<!DOCTYPE html>
<html lang="en" class="">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - OWASP BLT</title>
  <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }, colors: { primary: { DEFAULT: '#E10101', dark: '#BC0000' } } } }
    }
  </script>
  <style>body { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>

<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 antialiased transition-colors min-h-screen flex items-center justify-center px-4 py-8">

  <div class="w-full max-w-md">
    <!-- Back to Home Link -->
    <div class="mb-6 text-center">
      <a href="../index.html" class="inline-flex items-center gap-2 text-sm font-medium text-gray-600 dark:text-gray-400 hover:text-red-600 dark:hover:text-red-400 transition-colors">
        <i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Back to Home
      </a>
    </div>

    <!-- Signup Card -->
    <div class="bg-white dark:bg-gray-900 rounded-lg shadow-xl border border-gray-200 dark:border-gray-800">
      <!-- Header -->
      <div class="px-6 py-5 border-b border-gray-200 dark:border-gray-800">
        <div class="text-center">
          <img src="../assets/img/logo-lg.png" alt="OWASP BLT Logo" class="h-10 w-auto mx-auto mb-3">
          <h2 class="text-xl font-bold text-gray-900 dark:text-gray-100">Create Your Account</h2>
          <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Join the BLT community today</p>
        </div>
      </div>

      <!-- Form -->
      <div class="px-6 py-6">
        <form id="signupForm" class="space-y-4">
          <!-- Username -->
          <div>
            <label for="username" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">
              Username
            </label>
            <input 
              type="text" 
              id="username"
              name="username" 
              required 
              minlength="3"
              class="w-full px-3.5 py-2.5 text-sm border border-gray-300 dark:border-gray-700 rounded-md bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent transition-colors"
              placeholder="johndoe"
            />
          </div>

          <!-- Email -->
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">
              Email Address
            </label>
            <input 
              type="email" 
              id="email"
              name="email" 
              required 
              class="w-full px-3.5 py-2.5 text-sm border border-gray-300 dark:border-gray-700 rounded-md bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent transition-colors"
              placeholder="you@example.com"
            />
          </div>

          <!-- Password -->
          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">
              Password
            </label>
            <input 
              type="password" 
              id="password"
              name="password" 
              required 
              minlength="8"
              class="w-full px-3.5 py-2.5 text-sm border border-gray-300 dark:border-gray-700 rounded-md bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent transition-colors"
              placeholder="••••••••"
            />
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Must be at least 8 characters</p>
          </div>

          <!-- Confirm Password -->
          <div>
            <label for="confirmPassword" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">
              Confirm Password
            </label>
            <input 
              type="password" 
              id="confirmPassword"
              name="confirmPassword" 
              required 
              minlength="8"
              class="w-full px-3.5 py-2.5 text-sm border border-gray-300 dark:border-gray-700 rounded-md bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent transition-colors"
              placeholder="••••••••"
            />
          </div>

          <!-- Terms Agreement -->
          <div class="flex items-start gap-2">
            <input 
              type="checkbox" 
              id="terms" 
              required
              class="w-4 h-4 mt-0.5 text-red-600 border-gray-300 rounded focus:ring-red-600"
            >
            <label for="terms" class="text-xs text-gray-600 dark:text-gray-400">
              I agree to the <a href="#" class="font-medium text-red-600 dark:text-red-400 hover:text-red-700 dark:hover:text-red-300 transition-colors">Terms of Service</a> and <a href="#" class="font-medium text-red-600 dark:text-red-400 hover:text-red-700 dark:hover:text-red-300 transition-colors">Privacy Policy</a>
            </label>
          </div>

          <!-- Submit Button -->
          <button 
            type="submit" 
            class="w-full px-4 py-2.5 text-sm font-semibold text-white bg-red-600 rounded-md hover:bg-red-700 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-red-600 focus:ring-offset-2"
          >
            Create Account
          </button>
        </form>
      </div>

      <!-- Footer -->
      <div class="px-6 py-4 bg-gray-50 dark:bg-gray-800/50 border-t border-gray-200 dark:border-gray-800 rounded-b-lg">
        <p class="text-center text-sm text-gray-600 dark:text-gray-400">
          Already have an account? 
          <a href="login.html" class="font-medium text-red-600 dark:text-red-400 hover:text-red-700 dark:hover:text-red-300 transition-colors">
            Sign In
          </a>
        </p>
      </div>
    </div>

    <!-- Additional Info -->
    <p class="text-center text-xs text-gray-500 dark:text-gray-500 mt-6">
      <i class="fa-solid fa-shield-halved text-red-600 dark:text-red-400" aria-hidden="true"></i>
      Your data is secure and we'll never share it with third parties
    </p>
  </div>

  <script>
    // Theme initialization
    (function() {
      const h = document.documentElement;
      const s = localStorage.getItem('theme');
      if (s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches)) h.classList.add('dark');
    })();

    // Form submission handler
    document.getElementById('signupForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const username = formData.get('username');
      const email = formData.get('email');
      const password = formData.get('password');
      const confirmPassword = formData.get('confirmPassword');

      // Validate password match
      if (password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
      }

      // Implement actual signup logic
      try {
        const response = await fetch('/auth/signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            username,
            email,
            password
          })
        });

        if (!response.ok) {
          let message = 'Signup failed. Please try again.';
          try {
            const errorData = await response.json();
            if (errorData && errorData.message) {
              message = errorData.message;
            }
          } catch (_) {
            // Ignore JSON parse errors and use default message
          }
          alert(message);
          return;
        }

        // Optionally parse response body if needed
        // const data = await response.json();
        alert('Account created successfully. You can now sign in.');
        window.location.href = '../index.html';
      } catch (err) {
        alert('An error occurred while signing up. Please check your connection and try again.');
      }
    });
  </script>
</body>

</html>
